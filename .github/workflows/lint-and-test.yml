name: Lint and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
  
    steps:
    - uses: actions/checkout@v4
    - uses: excitedleigh/setup-nox@v2.0.0
    - name: Install dependencies
      run: |
        pip install poetry==2.3.2
        make build
    - name: Lint
      run: |
        make lint
    - name: Test with nox
      run: |
        make nox
